<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Engineering Course 🐍</title>
<style>
  :root {
    --bg-start: #041422;
    --bg-mid: #0a2342;
    --bg-end: #031017;
    --blue-light: #67e8f9;
    --blue-deep: #0f4da8;
    --accent: #22d3ee;
    --accent-2: #f59e0b;
    --white: #FFFFFF;
    --glass-bg: rgba(10, 28, 48, 0.58);
    --glass-border: rgba(133, 206, 255, 0.22);
    --stellantis-blue: #22d3ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top left, rgba(34, 211, 238, 0.22), transparent 28%),
      radial-gradient(circle at top right, rgba(245, 158, 11, 0.16), transparent 25%),
      radial-gradient(circle at bottom, rgba(14, 165, 233, 0.18), transparent 35%),
      linear-gradient(180deg, var(--bg-start), var(--bg-mid) 55%, var(--bg-end));
    background-size: 100% 100%, 100% 100%, 120% 120%, 100% 100%;
    animation: bgPulse 16s ease-in-out infinite alternate;
    color: var(--white);
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }
  @keyframes bgPulse {
    from { background-position: 0% 0%, 100% 0%, 50% 100%, 0% 0%; }
    to { background-position: 10% 5%, 90% 10%, 46% 88%, 0% 0%; }
  }

  /* WELCOME SCREEN */
  .welcome-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(130deg, rgba(4, 20, 34, 0.92), rgba(9, 51, 87, 0.9), rgba(69, 39, 7, 0.86));
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 1s ease-out;
  }
  .welcome-screen img {
    width: 300px;
    height: auto;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 20px rgba(103,232,249,0.45));
  }
  .welcome-screen h1 {
    font-size: 2.5rem;
    color: var(--white);
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255,255,255,0.5);
  }
  .welcome-screen p {
    font-size: 1.2rem;
    color: rgba(255,255,255,0.8);
  }

  /* HEADER */
  .header {
    background: linear-gradient(145deg, rgba(6, 28, 52, 0.88), rgba(3, 14, 29, 0.72));
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 28px;
    padding: 28px 34px;
    display: flex;
    align-items: center;
    gap: 18px;
    margin: 20px 36px 10px;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(103, 232, 249, 0.08);
    position: relative;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 28px;
    background: linear-gradient(120deg, rgba(34, 211, 238, 0.2), transparent 45%);
    pointer-events: none;
  }
  .header > * { position: relative; }
  .header .logo {
    font-size: 5.6rem;
    width: 140px;
    height: 140px;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, rgba(16, 58, 92, 0.9), rgba(31, 112, 157, 0.72));
    border: 1px solid rgba(103,232,249,0.4);
    border-radius: 28px;
    box-shadow: inset 0 0 0 1px rgba(103,232,249,0.25), 0 16px 28px rgba(0,0,0,0.35);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .header .logo:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: inset 0 0 0 1px rgba(103,232,249,0.28), 0 20px 30px rgba(0,0,0,0.4);
  }
  .header h1 {
    font-size: 2rem;
    color: #e0f2fe;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.75);
  }
  .header-tag {
    margin-left: auto;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    font-weight: 700;
    color: var(--white);
    background: rgba(34, 211, 238, 0.16);
    border: 1px solid rgba(34, 211, 238, 0.38);
  }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 12px 30px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-radius: 18px;
    margin: 0 36px 10px;
  }
  .progress-label { font-size: 0.8rem; color: rgba(255,255,255,0.75); white-space: nowrap; }
  .progress-track {
    flex: 1;
    height: 10px;
    background: rgba(255,255,255,0.12);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #0ea5e9, var(--accent-2));
    border-radius: 99px;
    transition: width 0.5s ease;
    box-shadow: 0 0 14px rgba(34, 211, 238, 0.5);
  }
  .progress-pct { font-size: 0.8rem; color: var(--white); font-weight: 700; }

  /* WEEKLY DATA */
  .weekly-wrap {
    margin: 0 36px 14px;
    background: linear-gradient(145deg, rgba(6, 27, 47, 0.82), rgba(4, 17, 33, 0.76));
    border: 1px solid rgba(34, 211, 238, 0.22);
    border-radius: 18px;
    padding: 16px 18px;
    backdrop-filter: blur(14px);
  }
  .weekly-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .weekly-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: #e0f2fe;
    letter-spacing: 0.02em;
  }
  .weekly-sub {
    font-size: 0.78rem;
    color: rgba(224, 242, 254, 0.72);
  }
  .weekly-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
  }
  .week-card {
    background: rgba(3, 20, 37, 0.75);
    border: 1px solid rgba(125, 211, 252, 0.24);
    border-radius: 12px;
    padding: 10px 10px 11px;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .week-card:hover {
    transform: translateY(-2px);
    border-color: rgba(125, 211, 252, 0.45);
  }
  .week-label {
    font-size: 0.76rem;
    font-weight: 700;
    color: rgba(224, 242, 254, 0.88);
    margin-bottom: 6px;
  }
  .week-metric {
    font-size: 0.74rem;
    color: rgba(224, 242, 254, 0.78);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .week-bar {
    width: 100%;
    height: 7px;
    border-radius: 999px;
    background: rgba(255,255,255,0.15);
    overflow: hidden;
  }
  .week-fill {
    height: 100%;
    background: linear-gradient(90deg, #22d3ee, #0ea5e9, #f59e0b);
    box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
  }

  /* WEEK HOME */
  .week-home {
    margin: 0 36px 14px;
    background: linear-gradient(145deg, rgba(6, 27, 47, 0.76), rgba(4, 17, 33, 0.72));
    border: 1px solid rgba(34, 211, 238, 0.22);
    border-radius: 18px;
    padding: 18px;
    backdrop-filter: blur(12px);
  }
  .week-home-head {
    margin-bottom: 14px;
  }
  .week-home-title {
    font-size: 1rem;
    font-weight: 700;
    color: #e0f2fe;
    margin-bottom: 4px;
  }
  .week-home-sub {
    font-size: 0.84rem;
    color: rgba(224, 242, 254, 0.75);
  }
  .week-home-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }
  .week-home-card {
    background: rgba(3, 20, 37, 0.78);
    border: 1px solid rgba(125, 211, 252, 0.24);
    border-radius: 14px;
    padding: 12px;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .week-home-card:hover {
    transform: translateY(-2px);
    border-color: rgba(125, 211, 252, 0.45);
    box-shadow: 0 10px 20px rgba(0,0,0,0.22);
  }
  .week-home-week {
    font-size: 0.9rem;
    font-weight: 700;
    color: #e0f2fe;
    margin-bottom: 4px;
  }
  .week-home-topic {
    font-size: 0.77rem;
    color: rgba(224, 242, 254, 0.78);
    min-height: 36px;
  }
  .week-home-btn {
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(135deg, #cffafe, #fbbf24);
    color: #082f49;
  }
  .week-home-btn:hover {
    background: linear-gradient(135deg, #e0f2fe, #f59e0b);
  }

  .course-nav-row {
    margin: 0 36px 12px;
    display: flex;
    justify-content: flex-end;
  }
  .home-btn {
    border: 1px solid rgba(125, 211, 252, 0.35);
    background: rgba(6, 27, 47, 0.78);
    color: #e0f2fe;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
  }
  .home-btn:hover {
    background: rgba(8, 38, 66, 0.9);
    border-color: rgba(125, 211, 252, 0.5);
  }

  /* LAYOUT */
  .layout {
    display: flex;
    height: calc(100vh - 120px);
  }

  /* SIDEBAR */
  .sidebar {
    width: 240px;
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-right: 1px solid var(--glass-border);
    overflow-y: auto;
    padding: 16px 0;
    flex-shrink: 0;
  }
  .sidebar-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.6);
    padding: 0 16px 10px;
  }
  .lesson-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 16px;
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    font-size: 0.85rem;
    text-align: left;
    transition: all 0.2s;
    border-left: 2px solid transparent;
  }
  .lesson-btn:hover {
    background: rgba(34,211,238,0.14);
    border-left-color: rgba(34,211,238,0.8);
    transform: translateX(4px);
  }
  .lesson-btn.active {
    background: linear-gradient(90deg, rgba(34,211,238,0.32), rgba(14,165,233,0.16));
    border-left-color: var(--accent-2);
    color: var(--white);
  }
  .lesson-btn.done .dot { background: #22c55e !important; }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    flex-shrink: 0;
  }
  .dot.active-dot { background: var(--white); }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px;
  }

  .lesson-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }
  .lesson-icon { font-size: 2rem; }
  .lesson-title { font-size: 1.6rem; font-weight: 700; color: var(--white); }
  .lesson-subtitle { font-size: 0.9rem; color: rgba(255,255,255,0.6); margin-bottom: 20px; }

  /* CARD */
  .card {
    background: linear-gradient(160deg, rgba(9, 32, 54, 0.72), rgba(5, 22, 40, 0.62));
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(34,211,238,0.48);
    box-shadow: 0 14px 30px rgba(0, 0, 0, 0.26);
  }
  .card h3 {
    font-size: 1rem;
    color: #7dd3fc;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card p, .card li {
    font-size: 0.92rem;
    color: rgba(255,255,255,0.9);
    line-height: 1.7;
  }
  .card ul { padding-left: 18px; }

  /* ANALOGY BOX */
  .analogy {
    background: rgba(26, 58, 42, 0.8);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(22, 101, 52, 0.5);
    border-radius: 10px;
    padding: 14px 18px;
    margin: 12px 0;
    font-size: 0.9rem;
    color: #86efac;
  }
  .analogy strong { color: #4ade80; }

  /* CODE BLOCK */
  .code-block {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(5px);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 16px 18px;
    font-family: 'Courier New', monospace;
    font-size: 0.88rem;
    line-height: 1.8;
    color: var(--white);
    margin: 12px 0;
    overflow-x: auto;
    position: relative;
  }
  .kw { color: #c084fc; font-weight: bold; }
  .str { color: #86efac; }
  .num { color: #fb923c; }
  .cmt { color: rgba(255,255,255,0.5); font-style: italic; }
  .fn { color: #38bdf8; }
  .var { color: #fde68a; }

  /* OUTPUT BOX */
  .output-box {
    background: rgba(2, 6, 23, 0.8);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(30, 64, 175, 0.5);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Courier New', monospace;
    font-size: 0.85rem;
    color: #6ee7b7;
    margin-top: 8px;
  }
  .output-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(30, 64, 175, 0.7);
    margin-bottom: 6px;
  }

  /* QUIZ */
  .quiz-card {
    background: var(--glass-bg);
    backdrop-filter: blur(10px);
    border: 2px solid var(--glass-border);
    border-radius: 12px;
    padding: 22px 26px;
    margin-top: 24px;
  }
  .quiz-card h3 { color: var(--white); font-size: 1rem; margin-bottom: 14px; }
  .quiz-q { font-size: 0.95rem; color: var(--white); margin-bottom: 14px; line-height: 1.6; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(5px);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 10px 16px;
    color: rgba(255,255,255,0.9);
    cursor: pointer;
    font-size: 0.88rem;
    text-align: left;
    transition: all 0.2s;
  }
  .opt-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--stellantis-blue); }
  .opt-btn.correct { background: rgba(20, 83, 45, 0.8); border-color: #22c55e; color: #86efac; }
  .opt-btn.wrong { background: rgba(76, 5, 25, 0.8); border-color: #ef4444; color: #fca5a5; }
  .quiz-feedback {
    margin-top: 12px;
    font-size: 0.9rem;
    padding: 10px 14px;
    border-radius: 8px;
    display: none;
  }
  .quiz-feedback.correct { background: rgba(20, 83, 45, 0.8); color: #86efac; display: block; }
  .quiz-feedback.wrong { background: rgba(76, 5, 25, 0.8); color: #fca5a5; display: block; }

  /* NAV BUTTONS */
  .nav-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }
  .nav-btn {
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .nav-btn.prev { background: rgba(51, 65, 85, 0.8); color: var(--white); }
  .nav-btn.prev:hover { background: rgba(71, 85, 105, 0.9); }
  .nav-btn.next { background: linear-gradient(135deg, #cffafe, #fbbf24); color: #082f49; box-shadow: 0 10px 22px rgba(245, 158, 11, 0.28); }
  .nav-btn.next:hover { background: linear-gradient(135deg, #e0f2fe, #f59e0b); transform: translateY(-2px); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

  /* BADGE */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
  }
  .badge-blue { background: var(--stellantis-blue); color: #bfdbfe; }
  .badge-green { background: rgba(22, 101, 52, 0.8); color: #bbf7d0; }
  .badge-yellow { background: rgba(133, 77, 14, 0.8); color: #fef08a; }

  /* CONGRATS */
  .congrats {
    text-align: center;
    padding: 40px 20px;
  }
  .congrats .trophy { font-size: 5rem; margin-bottom: 16px; }
  .congrats h2 { font-size: 2rem; color: var(--white); margin-bottom: 10px; }
  .congrats p { color: rgba(255,255,255,0.7); margin-bottom: 24px; font-size: 1rem; }
  .restart-btn {
    background: linear-gradient(135deg, #bae6fd, #f59e0b);
    color: #082f49;
    font-weight: 700;
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    font-size: 1rem;
    cursor: pointer;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 3px; }

  @media (max-width: 980px) {
    .header {
      padding: 20px 22px;
      gap: 12px;
      margin: 14px 16px 10px;
    }
    .header .logo {
      width: 92px;
      height: 92px;
      font-size: 3.6rem;
      border-radius: 22px;
    }
    .header h1 { font-size: 1.45rem; }
    .header-tag { display: none; }
    .progress-bar-wrap { margin: 0 16px 10px; padding: 10px 14px; }
    .weekly-wrap { margin: 0 16px 10px; }
    .week-home { margin: 0 16px 10px; }
    .week-home-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .course-nav-row { margin: 0 16px 10px; }
    .weekly-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .layout { flex-direction: column; height: auto; }
    .sidebar { width: 100%; max-height: 180px; }
    .main { padding: 18px 16px; }
    .welcome-screen img { width: 220px; }
  }
</style>
</head>
<body>

<div id="welcome" class="welcome-screen">
  <img src="Design&trims.png" alt="Design & Trims Logo">
  <h1>Welcome to AI Engineering Course</h1>
  <p>Loading your training session...</p>
</div>

<div class="header">
  <div class="logo">🐍</div>
  <div>
    <h1>AI Engineering Course</h1>
    <p id="headerSubtitle">Choose your training week</p>
  </div>
  <div class="header-tag">Team Training</div>
</div>

<div class="week-home" id="weekHome"></div>

<div id="courseApp" style="display:none;">
<div class="course-nav-row">
  <button class="home-btn" onclick="goHome()">Back To Week Home</button>
</div>

<div class="progress-bar-wrap">
  <span class="progress-label">Your Progress</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <span class="progress-pct" id="progressPct">0%</span>
</div>

<div class="weekly-wrap">
  <div class="weekly-head">
    <div class="weekly-title">Weekly Learning Data</div>
    <div class="weekly-sub">Track lesson completion, quiz score, and study time</div>
  </div>
  <div class="weekly-grid" id="weeklyGrid"></div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>
</div>

<script>
const week4Lessons = [
  {
    id: 0,
    icon: "👋",
    title: "What is Programming?",
    subtitle: "Let's start from absolute scratch",
    content: `
      <div class="card">
        <h3>🤔 What is a computer program?</h3>
        <p>Think of a computer program as a <strong>recipe</strong>. Just like a recipe tells a cook exactly what to do step by step, a program tells the computer exactly what to do, step by step.</p>
        <div class="analogy">
          <strong>Real life analogy:</strong><br>
          Recipe: "Boil water → Add noodles → Wait 5 mins → Drain → Serve"<br>
          Program: "Get number → Add 10 → Show the result"<br><br>
          Both are just <em>instructions in order</em>.
        </div>
      </div>
      <div class="card">
        <h3>🐍 Why Python?</h3>
        <p>Python is one of the <strong>easiest</strong> programming languages to read. It looks almost like plain English! That's why it's perfect for beginners.</p>
        <div class="code-block">
          <span class="cmt"># This is Python code. It reads like a sentence!</span><br>
          <span class="fn">print</span>(<span class="str">"Hello, World!"</span>)
        </div>
        <div class="output-box">
          <div class="output-label">▶ Output</div>
          Hello, World!
        </div>
        <p style="margin-top:10px"><code style="background:#0f172a;padding:2px 6px;border-radius:4px;color:#facc15">print()</code> is Python's way of <strong>displaying something on screen</strong>. Like saying "show this to me".</p>
      </div>
      <div class="card">

  if (!grid) return;

  grid.innerHTML = weeklyData.map(item => {
    const lessonPct = Math.round((item.lessonsDone / item.lessonsTarget) * 100);
    const progressPct = Math.max(0, Math.min(100, Math.round((lessonPct + item.quizScore) / 2)));
    return `
      <div class="week-card">
        <div class="week-label">${item.week}</div>
        <div class="week-metric">Lessons: ${item.lessonsDone}/${item.lessonsTarget}</div>

        <div class="week-metric">Study Time: ${item.studyMins} mins</div>
        <div class="week-bar"><div class="week-fill" style="width:${progressPct}%"></div></div>

}

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';

  const currentWeek = weeklyData[activeWeek - 1];
  if (currentWeek) {
    currentWeek.lessonsDone = answered.size;
    currentWeek.lessonsTarget = activeLessons.length;
    currentWeek.quizScore = pct;
    renderWeeklyData();
  }
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  if (!activeLessons.length) {
    sb.innerHTML = '';
    return;
  }

  sb.innerHTML = `<div class="sidebar-title">Week ${activeWeek} Lessons</div>` +
    activeLessons.map((l, i) => `
      <button class="lesson-btn ${i === current ? 'active' : ''} ${answered.has(i) ? 'done' : ''}" onclick="goTo(${i})">
        <span class="dot ${i === current ? 'active-dot' : ''}"></span>
        ${l.icon} ${l.title}
      </button>
    `).join('');
}

function renderLesson(idx) {
  const l = activeLessons[idx];
  const isLast = idx === activeLessons.length - 1;
  const quizHtml = `
    <div class="quiz-card">
      <h3>?? Quick Check</h3>
      <div class="quiz-q"><pre style="font-family:inherit;white-space:pre-wrap">${l.quiz.q}</pre></div>
      <div class="options">
        ${l.quiz.options.map((opt, oi) =>
          `<button class="opt-btn" onclick="checkAnswer(${oi}, ${l.quiz.answer}, '${l.quiz.explanation.replace(/'/g,"\\'")}', this)">${opt}</button>`
        ).join('')}
      </div>
      <div class="quiz-feedback" id="feedback-${idx}"></div>
    </div>
  `;

  const practiceModelsHtml = activeWeek === 4 && isLast ? `
    <div class="card">
      <h3>Practice Models To Try</h3>
      <p>Use these mini-model exercises for hands-on practice with your team.</p>
      <ul>
        <li><strong>Model 1:</strong> Build a grade checker using <code>if / elif / else</code> for 5 students.</li>
        <li><strong>Model 2:</strong> Loop through employee names and print a personalized welcome message.</li>
        <li><strong>Model 3:</strong> Use a <code>while</code> loop counter from 1 to 20 and print only odd numbers.</li>
        <li><strong>Model 4:</strong> Combine loop + condition + <code>break</code> to stop when score reaches 90.</li>
      </ul>
      <div class="code-block">
        <span class="cmt"># Starter challenge template</span><br>
        <span class="var">scores</span> = [<span class="num">67</span>, <span class="num">82</span>, <span class="num">91</span>, <span class="num">76</span>]<br>
        <span class="kw">for</span> <span class="var">score</span> <span class="kw">in</span> <span class="var">scores</span>:<br>
        &nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">if</span> <span class="var">score</span> >= <span class="num">90</span>:<br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="fn">print</span>(<span class="str">"Top score found!"</span>, <span class="var">score</span>)<br>
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">break</span>
      </div>
    </div>
  ` : '';

  document.getElementById('main').innerHTML = `
    <div class="lesson-header">
      <div class="lesson-icon">${l.icon}</div>
      <div>
        <div class="lesson-title">${l.title}</div>
      </div>
    </div>
    <div class="lesson-subtitle">${l.subtitle}</div>
    ${l.content}
    ${quizHtml}
    ${practiceModelsHtml}
    <div class="nav-row">
      <button class="nav-btn prev" onclick="goTo(${idx - 1})" ${idx === 0 ? 'disabled' : ''}><- Previous</button>
      <button class="nav-btn next" id="nextBtn" onclick="goTo(${idx + 1})" ${isLast ? 'disabled' : ''}>Next -></button>
    </div>
  `;
  renderSidebar();
}

function checkAnswer(chosen, correct, explanation, btn) {
  const allBtns = btn.parentElement.querySelectorAll('.opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const feedbackEl = document.getElementById(`feedback-${current}`);

  if (chosen === correct) {
    btn.classList.add('correct');
    feedbackEl.textContent = explanation;
    feedbackEl.className = 'quiz-feedback correct';
    answered.add(current);
    updateProgress();
    renderSidebar();
  } else {
    btn.classList.add('wrong');
    allBtns[correct].classList.add('correct');
    feedbackEl.textContent = `Not quite. ${explanation}`;
    feedbackEl.className = 'quiz-feedback wrong';
  }
}

function goTo(idx) {
  if (idx < 0 || idx >= activeLessons.length) return;
  current = idx;
  renderLesson(idx);
  document.getElementById('main').scrollTop = 0;
}

// Init
renderWeekHome();
goHome();
// Welcome screen
window.addEventListener('load', () => {
  setTimeout(() => {
    const welcome = document.getElementById('welcome');
    welcome.style.opacity = '0';
    setTimeout(() => {
      welcome.style.display = 'none';
      document.body.style.overflow = 'auto';
    }, 1000);
  }, 3000);
});
</script>
</body>
</html>
